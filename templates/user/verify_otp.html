{% extends 'base.html' %}

{% block title %}Verify Pass | FlixOra{% endblock %}

{% block content %}
<div class="form-card" style="border-color: var(--neon-purple); box-shadow: var(--glow-purple); position: relative; overflow: hidden; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: rgba(15, 15, 25, 0.7); max-width: 440px; margin: 3rem auto; padding: 3rem 2.2rem 2.2rem 2.2rem;">
    <!-- Abstract background glow elements -->
    <div style="position: absolute; top: -50px; left: -50px; width: 120px; height: 120px; background: rgba(176, 38, 255, 0.15); filter: blur(35px); border-radius: 50%;"></div>
    <div style="position: absolute; bottom: -50px; right: -50px; width: 120px; height: 120px; background: rgba(0, 243, 255, 0.15); filter: blur(35px); border-radius: 50%;"></div>

    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(176, 38, 255, 0.4); margin-bottom: 1rem;">
            <i class="fa-solid fa-envelope-open-text" style="font-size: 1.8rem; color: #fff;"></i>
        </div>
        <h2 class="form-title" style="text-shadow: 0 0 15px rgba(176, 38, 255, 0.4); margin-bottom: 0.2rem; font-size: 1.8rem; letter-spacing: 1px;">
            VERIFY <span style="color: var(--neon-purple);">EMAIL</span>
        </h2>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.3rem; line-height: 1.4;">
            We sent a 6-digit verification code to:<br>
            <strong style="color: #fff; font-size: 0.9rem;">{{ email }}</strong>
        </p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 1.8rem;">
            <label class="form-label" for="id_otp_code" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--text-dim); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem;">
                Enter 6-Digit Code
            </label>
            
            <div style="max-width: 280px; margin: 0 auto; position: relative;">
                <input type="text" name="otp_code" maxlength="6" required id="id_otp_code" autocomplete="one-time-code" placeholder="••••••" style="width: 100%; text-align: center; font-size: 2.2rem; letter-spacing: 8px; padding: 0.6rem; border-radius: 14px; background: rgba(255,255,255,0.02); border: 2px solid rgba(255,255,255,0.1); color: #fff; font-family: monospace; outline: none; transition: all 0.3s ease; box-sizing: border-box;">
            </div>
        </div>

        <div class="form-actions" style="margin-top: 2rem;">
            <button type="submit" class="btn-neon form-btn-full" style="border-color: var(--neon-purple); box-shadow: var(--glow-purple); padding: 0.9rem; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease;">
                <i class="fa-solid fa-user-check"></i> Activate Account
            </button>
        </div>
    </form>
    
    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.85rem; color: var(--text-dim);">
        Didn't receive the email? <a href="{% url 'resend_otp' %}" style="color: var(--neon-cyan); text-decoration: none; font-weight: 800; transition: color 0.2s ease;">Resend Code</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const otpInput = document.getElementById("id_otp_code");
        if(otpInput) {
            otpInput.focus();
            
            otpInput.addEventListener("input", function(e) {
                otpInput.value = otpInput.value.replace(/[^0-9]/g, "");
            });
        }
    });
</script>

<style>
    #id_otp_code:focus {
        border-color: var(--neon-purple) !important;
        box-shadow: 0 0 15px rgba(176, 38, 255, 0.35) !important;
        background: rgba(176, 38, 255, 0.02) !important;
    }
</style>
{% endblock %}
