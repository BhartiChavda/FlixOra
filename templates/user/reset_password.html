{% extends 'base.html' %}

{% block title %}Reset Password | FlixOra{% endblock %}

{% block content %}
<div class="form-card" style="border-color: var(--neon-purple); box-shadow: var(--glow-purple); position: relative; overflow: hidden; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: rgba(15, 15, 25, 0.7); max-width: 450px; margin: 3rem auto; padding: 3rem 2.2rem 2.2rem 2.2rem;">
    <!-- Abstract background glow elements -->
    <div style="position: absolute; top: -50px; left: -50px; width: 120px; height: 120px; background: rgba(176, 38, 255, 0.15); filter: blur(35px); border-radius: 50%;"></div>
    <div style="position: absolute; bottom: -50px; right: -50px; width: 120px; height: 120px; background: rgba(0, 243, 255, 0.15); filter: blur(35px); border-radius: 50%;"></div>

    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(176, 38, 255, 0.4); margin-bottom: 1rem;">
            <i class="fa-solid fa-lock" style="font-size: 1.8rem; color: #fff;"></i>
        </div>
        <h2 class="form-title" style="text-shadow: 0 0 15px rgba(176, 38, 255, 0.4); margin-bottom: 0.2rem; font-size: 1.8rem; letter-spacing: 1px;">
            RESET <span style="color: var(--neon-purple);">PASSWORD</span>
        </h2>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.3rem; line-height: 1.4;">
            We sent a 6-digit OTP code to your registered email.<br>
            <span style="color: #fff; font-weight: 600;">Please set your new password below.</span>
        </p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label" for="id_otp_code" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--text-dim); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.6rem;">
                Enter 6-Digit Reset Code
            </label>
            <div style="max-width: 260px; margin: 0 auto; position: relative;">
                <input type="text" name="otp_code" maxlength="6" required id="id_otp_code" autocomplete="one-time-code" placeholder="••••••" style="width: 100%; text-align: center; font-size: 2rem; letter-spacing: 6px; padding: 0.5rem; border-radius: 12px; background: rgba(255,255,255,0.02); border: 2px solid rgba(255,255,255,0.1); color: #fff; font-family: monospace; outline: none; transition: all 0.3s ease; box-sizing: border-box;">
            </div>
        </div>

        <div class="form-group" style="position: relative; margin-bottom: 1.5rem;">
            <label class="form-label" for="id_new_password" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-dim); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">
                <i class="fa-solid fa-key" style="color: var(--neon-purple);"></i> New Password
            </label>
            <div style="position: relative;">
                <input type="password" name="new_password" required id="id_new_password" class="form-input" placeholder="Enter new password" style="padding-left: 2.8rem; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); font-size: 0.95rem; width: 100%; box-sizing: border-box;">
                <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.9rem;"></i>
            </div>
        </div>

        <div class="form-group" style="position: relative; margin-bottom: 1.8rem;">
            <label class="form-label" for="id_confirm_password" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-dim); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">
                <i class="fa-solid fa-key" style="color: var(--neon-purple);"></i> Confirm New Password
            </label>
            <div style="position: relative;">
                <input type="password" name="confirm_password" required id="id_confirm_password" class="form-input" placeholder="Confirm new password" style="padding-left: 2.8rem; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); font-size: 0.95rem; width: 100%; box-sizing: border-box;">
                <i class="fa-solid fa-lock-open" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.9rem;"></i>
            </div>
        </div>

        <div class="form-actions" style="margin-top: 2rem;">
            <button type="submit" class="btn-neon form-btn-full" style="border-color: var(--neon-purple); box-shadow: var(--glow-purple); padding: 0.9rem; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease;">
                <i class="fa-solid fa-check"></i> Reset Password
            </button>
        </div>
    </form>
    
    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.85rem; color: var(--text-dim);">
        Need another code? <a href="{% url 'forgot_password' %}" style="color: var(--neon-cyan); text-decoration: none; font-weight: 800; transition: color 0.2s ease;">Request Code</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const otpInput = document.getElementById("id_otp_code");
        if(otpInput) {
            otpInput.focus();
            otpInput.addEventListener("input", function(e) {
                otpInput.value = otpInput.value.replace(/[^0-9]/g, "");
            });
        }
    });
</script>

<style>
    .form-card input.form-input {
        padding-left: 2.8rem !important;
        border-radius: 12px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.08);
        box-sizing: border-box;
        width: 100%;
    }
    .form-card input.form-input:focus {
        border-color: var(--neon-purple) !important;
        box-shadow: 0 0 10px rgba(176, 38, 255, 0.2) !important;
    }
    #id_otp_code:focus {
        border-color: var(--neon-purple) !important;
        box-shadow: 0 0 15px rgba(176, 38, 255, 0.35) !important;
        background: rgba(176, 38, 255, 0.02) !important;
    }
</style>
{% endblock %}
